<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Libftea</title>
		<script>
			// SPA redirect for GitHub Pages
			// Keeps the first path segment (/transcendence) so the app reloads correctly
			var pathSegmentsToKeep = 1;
			var l = window.location;
			l.replace(
				l.protocol +
					'//' +
					l.host +
					l.pathname
						.split('/')
						.slice(0, 1 + pathSegmentsToKeep)
						.join('/') +
					'/?/' +
					l.pathname
						.slice(1)
						.split('/')
						.slice(pathSegmentsToKeep)
						.join('/')
						.replace(/&/g, '~and~') +
					(l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
					l.hash,
			);
		</script>
	</head>
	<body></body>
</html>
